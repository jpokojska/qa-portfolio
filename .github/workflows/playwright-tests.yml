name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout qa-portfolio
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Checkout Restful-Booker Platform
        uses: actions/checkout@v4
        with:
          repository: mwinteringham/restful-booker-platform
          path: restful-booker-platform

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Build Restful-Booker Platform
        working-directory: restful-booker-platform
        run: mvn clean install -DskipTests

      - name: Start Restful-Booker Platform
        working-directory: restful-booker-platform
        run: bash run_locally.sh &

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Restful-Booker to start..."
          for i in $(seq 1 30); do
            curl -s http://localhost:3003 > /dev/null && echo "App is up!" && break
            echo "Attempt $i — waiting 5s..."
            sleep 5
          done

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: e2e-tests
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: playwright install chromium --with-deps --only-shell

      - name: Run Playwright tests
        working-directory: e2e-tests
        run: |
          pytest tests/ \
            --html=report.html \
            --self-contained-html \
            -v

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/report.html
          retention-days: 14